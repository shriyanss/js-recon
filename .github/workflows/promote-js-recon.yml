# Manually-triggered second phase of a release, run after a staged npm publish
# (see publish-js-recon.yml) has been approved by a human with 2FA on npmjs.com.
# Installs js-recon from the published npm registry artifact rather than
# building from git source, so the Homebrew/Docker/GHCR outputs are provably
# the same bits that were reviewed and approved on npm.

name: Promote JS Recon Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Published npm version to promote (e.g. 1.4.1-alpha.6, no leading v)"
        required: true
        type: string

jobs:
  update-homebrew-tap:
    runs-on: ubuntu-latest
    environment: homebrew-publish
    steps:
      - name: Fetch published tarball and compute SHA256
        id: sha256
        run: |
          npm pack "@js-recon/js-recon@${VERSION}"
          SHA=$(sha256sum "js-recon-js-recon-${VERSION}.tgz" | awk '{print $1}')
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ inputs.version }}

      - name: Determine target formula
        id: formula
        run: |
          if [[ "$VERSION" == *"alpha"* ]]; then
            FORMULA="Formula/js-recon-alpha.rb"
          elif [[ "$VERSION" == *"beta"* ]]; then
            FORMULA="Formula/js-recon-beta.rb"
          else
            FORMULA="Formula/js-recon.rb"
          fi
          echo "formula=${FORMULA}" >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ inputs.version }}

      - name: Check out homebrew-tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: js-recon/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_GH_PAT }}
          path: homebrew-tap

      - name: Update formula fields
        working-directory: homebrew-tap
        run: |
          sed -i "s|^  url \"https://registry\.npmjs\.org/@js-recon/js-recon/-/js-recon-[^\"]*\"|  url \"https://registry.npmjs.org/@js-recon/js-recon/-/js-recon-${VERSION}.tgz\"|" "${FORMULA}"
          sed -i "s|^  sha256 \"[a-f0-9]*\"|  sha256 \"${SHA}\"|" "${FORMULA}"
        env:
          VERSION: ${{ inputs.version }}
          SHA: ${{ steps.sha256.outputs.sha256 }}
          FORMULA: ${{ steps.formula.outputs.formula }}

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${FORMULA}"
          git commit -m "chore: update ${FORMULA} to ${VERSION}"
          git push
        env:
          VERSION: ${{ inputs.version }}
          FORMULA: ${{ steps.formula.outputs.formula }}

  publish-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push to github container registry
        run: |
          # build the image from the published npm artifact
          docker build -f Dockerfile.release --build-arg JS_RECON_VERSION=$VERSION -t ghcr.io/js-recon/js-recon:$VERSION .

          # check if it is alpha or beta. default to latest
          TAG="latest"
          [[ "$VERSION" == *"beta"* ]] && TAG="beta"
          [[ "$VERSION" == *"alpha"* ]] && TAG="alpha"

          # tag again with whatever has been set
          docker tag ghcr.io/js-recon/js-recon:$VERSION ghcr.io/js-recon/js-recon:$TAG

          # push images with both tags
          docker push ghcr.io/js-recon/js-recon:$VERSION
          docker push ghcr.io/js-recon/js-recon:$TAG

        env:
          VERSION: ${{ inputs.version }}

  verify-npm-install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout js-recon-labs
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: js-recon/js-recon-labs
          path: js-recon-labs

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install js-recon globally from npm
        run: npm install -g "@js-recon/js-recon@${VERSION}"
        env:
          VERSION: ${{ inputs.version }}

      - name: Verify installed version
        run: |
          INSTALLED=$(js-recon -V)
          echo "Installed: ${INSTALLED}"
          [[ "$INSTALLED" == *"$VERSION"* ]] || { echo "Version mismatch"; exit 1; }
        env:
          VERSION: ${{ inputs.version }}

      - name: Install and start vulnerable app
        working-directory: js-recon-labs/next_js/vuln-all-rules
        run: |
          npm ci
          npm run build
          npm start &

      - name: Wait for app to be ready
        run: timeout 60 bash -c 'until curl -sf http://localhost:3001 > /dev/null; do sleep 2; done'

      - name: Run installed js-recon against the lab app
        run: |
          echo "http://localhost:3001" > /tmp/npm-smoke-urls.txt
          js-recon run -u /tmp/npm-smoke-urls.txt --no-sandbox -y -k
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable

      - name: Verify expected output files exist
        run: |
          test -n "$(find output -name analyze.json)" || { echo "analyze.json missing"; exit 1; }
          test -n "$(find output -name js-recon.db)" || { echo "js-recon.db missing"; exit 1; }

  verify-docker-install:
    runs-on: ubuntu-latest
    needs: publish-ghcr
    steps:
      - name: Checkout js-recon-labs
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: js-recon/js-recon-labs
          path: js-recon-labs

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify installed version
        run: |
          INSTALLED=$(docker run --rm ghcr.io/js-recon/js-recon:${VERSION} -V)
          echo "Installed: ${INSTALLED}"
          [[ "$INSTALLED" == *"$VERSION"* ]] || { echo "Version mismatch"; exit 1; }
        env:
          VERSION: ${{ inputs.version }}

      - name: Install and start vulnerable app
        working-directory: js-recon-labs/next_js/vuln-all-rules
        run: |
          npm ci
          npm run build
          npm start &

      - name: Wait for app to be ready
        run: timeout 60 bash -c 'until curl -sf http://localhost:3001 > /dev/null; do sleep 2; done'

      - name: Run containerized js-recon against the lab app
        run: |
          mkdir -p /tmp/docker-output
          echo "http://localhost:3001" > /tmp/docker-smoke-urls.txt
          docker run --rm --network host \
            -v /tmp/docker-output:/app/output \
            -v /tmp/docker-smoke-urls.txt:/app/urls.txt \
            ghcr.io/js-recon/js-recon:${VERSION} \
            run -u /app/urls.txt --no-sandbox -y -k
        env:
          VERSION: ${{ inputs.version }}

      - name: Verify expected output files exist
        run: |
          test -n "$(find /tmp/docker-output -name analyze.json)" || { echo "analyze.json missing"; exit 1; }
          test -n "$(find /tmp/docker-output -name js-recon.db)" || { echo "js-recon.db missing"; exit 1; }

  verify-brew-install:
    runs-on: macos-latest
    needs: update-homebrew-tap
    strategy:
      fail-fast: false
      matrix:
        formula: [js-recon, js-recon-alpha, js-recon-beta]
    steps:
      - name: Checkout js-recon-labs
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: js-recon/js-recon-labs
          path: js-recon-labs

      - name: Tap and install
        run: |
          brew tap js-recon/tap
          brew update
          brew install "js-recon/tap/${{ matrix.formula }}"

      - name: Verify installed version
        run: |
          INSTALLED=$(js-recon -V)
          echo "Installed: ${INSTALLED}"

      - name: Install and start vulnerable app
        working-directory: js-recon-labs/next_js/vuln-all-rules
        run: |
          npm ci
          npm run build
          npm start &

      - name: Wait for app to be ready
        run: timeout 60 bash -c 'until curl -sf http://localhost:3001 > /dev/null; do sleep 2; done'

      - name: Run installed js-recon against the lab app
        run: |
          echo "http://localhost:3001" > /tmp/brew-smoke-urls.txt
          js-recon run -u /tmp/brew-smoke-urls.txt -y -k

      - name: Verify expected output files exist
        run: |
          test -n "$(find output -name analyze.json)" || { echo "analyze.json missing"; exit 1; }
          test -n "$(find output -name js-recon.db)" || { echo "js-recon.db missing"; exit 1; }
