name: Build & Prettify Code

on:
  push:
    branches-ignore:
      - main

jobs:
  version_check:
    if: |
      !startsWith(github.event.head_commit.message, 'chore: merge changes after release') &&
      !startsWith(github.event.head_commit.message, 'chore: prettify code')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check version mismatch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "[i] Checking if the version in the CHANGELOG.md and package.json version matches"
          PACKAGE_JSON_VERSION=$(cat package.json | jq ".version" -r)
          CHANGELOG_VERSION=$(cat CHANGELOG.md | grep -E "^## [0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)(\.[0-9]+)?)?" | head -n 1 | sed -E 's/^## ([0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)(\.[0-9]+)?)?).*/\1/')
          GLOBALS_FILE_VERSION=$(grep -E '^const version =.+' src/globalConfig.ts | sed -E 's/^const version = \"(.*)\";/\1/')
          if [[ "$PACKAGE_JSON_VERSION" != "$CHANGELOG_VERSION" ]]; then
            echo "Version number mismatch between PACKAGE_JSON_VERSION and CHANGELOG_VERSION"
            exit 1
          elif [[ "$PACKAGE_JSON_VERSION" != "$GLOBALS_FILE_VERSION" ]]; then
            echo "Version number mismatch between PACKAGE_JSON_VERSION and GLOBALS_FILE_VERSION"
            exit 1
          else
            echo "[✓] Version matches"
            echo "[i] Checking if the version already exists on GitHub"
            if gh release view "v$PACKAGE_JSON_VERSION" >/dev/null 2>&1; then
              echo "Version v$PACKAGE_JSON_VERSION already exists on GitHub."
              exit 1
            else
              echo "[✓] Version v$PACKAGE_JSON_VERSION does not exist on GitHub."
            fi
          fi

  audit:
    runs-on: ubuntu-latest
    needs: version_check
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit
        run: npm audit

  prettier:
    runs-on: ubuntu-latest
    needs: audit
    environment: commit-signing
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Make sure the action checks out the repository to the pull request branch
          ref: ${{ github.ref_name }}

      - name: Configure SSH commit signing
        uses: shriyanss/verified-commit-action@v1
        with:
          ssh-private-key: ${{ secrets.JS_RECON_SIGNING_KEY }}
          commit-name: "js-recon-bot"
          commit-email: ${{ secrets.JS_RECON_SIGNING_EMAIL }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Prettier
        run: npm install -g prettier

      - name: Run Prettier
        run: prettier --write . --config .prettierrc

      - name: Remove node_modules
        run: rm -rf node_modules

      - name: Commit and push changes
        run: |
          git add .
          git commit -m "chore: prettify code" || echo "No changes to commit"
          git push

  test:
    needs: prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Make sure the action checks out the repository to the pull request branch
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build code
        run: npm run build
  build-docker:
    needs: build
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Make sure the action checks out the repository to the pull request branch
          ref: ${{ github.ref_name }}
      - name: Build docker container
        run: docker build -t js-recon/js-recon .

  integration-test-docker:
    needs: build-docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout js-recon
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}

      - name: Checkout js-recon-labs
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: js-recon/js-recon-labs
          path: js-recon-labs

      - name: Checkout js-recon-rules
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: js-recon/js-recon-rules
          path: js-recon-rules

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Build js-recon Docker image
        run: docker build -t js-recon/js-recon .

      - name: Install vuln-all-rules app dependencies
        working-directory: js-recon-labs/next_js/vuln-all-rules
        run: npm ci

      - name: Build vuln-all-rules app
        working-directory: js-recon-labs/next_js/vuln-all-rules
        run: npm run build

      - name: Start vuln-all-rules app
        working-directory: js-recon-labs/next_js/vuln-all-rules
        run: npm start &

      - name: Wait for lab app to be ready
        run: |
          echo "Waiting for lab app on port 3001..."
          n=0
          until curl -sf http://localhost:3001 > /dev/null; do
            n=$((n+1))
            [ $n -ge 30 ] && echo "Timed out waiting for lab app" && exit 1
            sleep 2
          done
          echo "Lab app is ready."

      - name: Run js-recon via Docker against lab app
        run: |
          docker run --name js-recon-run \
            --network host \
            -v "$(pwd)/js-recon-rules:/home/pptruser/js-recon-rules" \
            --entrypoint /bin/bash \
            js-recon/js-recon \
            -c 'mkdir -p ~/.js-recon && ln -sf /home/pptruser/js-recon-rules ~/.js-recon/rules && printf "http://localhost:3001\n" > /tmp/urls.txt && node build/index.js run -u /tmp/urls.txt -r ./js-recon-rules --no-sandbox -y -k'
          mkdir -p output
          docker cp js-recon-run:/home/pptruser/output/. ./output/ 2>/dev/null || true
          docker rm js-recon-run

      - name: Verify all rules fired
        run: node scripts/smoke-test.js

      - name: Upload analyze.json on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analyze-json-docker
          path: output/localhost_3001/analyze.json
          if-no-files-found: ignore

      - name: Build the rules-bundled (-w-rules) image
        run: docker build -f Dockerfile.w-rules --build-arg BASE_IMAGE=js-recon/js-recon -t js-recon/js-recon-w-rules .

      - name: Run js-recon-w-rules via Docker against lab app (no rules mount, no -r)
        run: |
          mkdir -p output-w-rules
          docker run --name js-recon-w-rules-run \
            --network host \
            --entrypoint /bin/bash \
            js-recon/js-recon-w-rules \
            -c 'printf "http://localhost:3001\n" > /tmp/urls.txt && node build/index.js run -u /tmp/urls.txt --no-sandbox -y -k' \
            | tee docker-w-rules-run.log
          docker cp js-recon-w-rules-run:/home/pptruser/output/. ./output-w-rules/ 2>/dev/null || true
          docker rm js-recon-w-rules-run

      - name: Verify the version check was actually skipped
        run: |
          grep -q "Rules version check disabled" docker-w-rules-run.log || {
            echo "Expected log line confirming JS_RECON_DISABLE_RULES_VERSION_CHECK was honored not found"
            exit 1
          }

      - name: Verify all rules fired (w-rules image)
        run: node scripts/smoke-test.js output-w-rules/localhost_3001/analyze.json

      - name: Upload w-rules analyze.json on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analyze-json-docker-w-rules
          path: output-w-rules/localhost_3001/analyze.json
          if-no-files-found: ignore

  integration-test-macos:
    needs: build
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout js-recon
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}

      - name: Checkout js-recon-labs
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: js-recon/js-recon-labs
          path: js-recon-labs

      - name: Checkout js-recon-rules
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: js-recon/js-recon-rules
          path: js-recon-rules

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Chrome
        run: brew install --cask google-chrome

      - name: Install js-recon dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"

      - name: Build js-recon
        run: npm run build

      - name: Install vuln-all-rules app dependencies
        working-directory: js-recon-labs/next_js/vuln-all-rules
        run: npm ci

      - name: Build vuln-all-rules app
        working-directory: js-recon-labs/next_js/vuln-all-rules
        run: npm run build

      - name: Start vuln-all-rules app
        working-directory: js-recon-labs/next_js/vuln-all-rules
        run: npm start &

      - name: Wait for lab app to be ready
        run: |
          echo "Waiting for lab app on port 3001..."
          n=0
          until curl -sf http://localhost:3001 > /dev/null; do
            n=$((n+1))
            [ $n -ge 30 ] && echo "Timed out waiting for lab app" && exit 1
            sleep 2
          done
          echo "Lab app is ready."

      - name: Pre-populate js-recon rules cache
        run: |
          mkdir -p ~/.js-recon
          ln -sf "$GITHUB_WORKSPACE/js-recon-rules" ~/.js-recon/rules

      - name: Run js-recon natively against lab app
        run: |
          echo "http://localhost:3001" > /tmp/smoke-urls.txt
          node --max-old-space-size=4096 build/index.js run \
            -u /tmp/smoke-urls.txt \
            -r ./js-recon-rules \
            -y -k
        env:
          PUPPETEER_EXECUTABLE_PATH: /Applications/Google Chrome.app/Contents/MacOS/Google Chrome

      - name: Verify all rules fired
        run: node scripts/smoke-test.js

      - name: Upload analyze.json on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analyze-json-macos
          path: output/localhost_3001/analyze.json
          if-no-files-found: ignore
